name: Monitor de vuelos

on:
  schedule:
    # 09:07 y 20:07 de Buenos Aires
    - cron: "7 12,23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  buscar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests python-dotenv

      - name: Buscar vuelos
        env:
          SERP_API_KEY: ${{ secrets.SERP_API_KEY }}
          TP_TOKEN: ${{ secrets.TP_TOKEN }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          ORIGEN: EZE
          DESTINO: MAD
          SALIDA_DESDE: "2026-08-23"
          SALIDA_HASTA: "2026-08-27"
          NOCHES: "4"
          FECHA_OBJETIVO: "2026-08-25"
          UMBRAL: "1000"
          MONEDA: usd
          RESUMEN_DIARIO: "true"
        run: python buscar_vuelos.py

      - name: Guardar estado
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add estado.json || true
          git add historial.csv || true
          git diff --staged --quiet || git commit -m "Actualizar estado [skip ci]"
          git push
