name: Monitor de vuelos

on:
  schedule:
    - cron: "7 12,17,23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  buscar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests python-dotenv

      - name: Buscar vuelos
        env:
          TP_TOKEN: ${{ secrets.TP_TOKEN }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          SERP_API_KEY: ${{ secrets.SERP_API_KEY }}
          ORIGEN: EZE
          DESTINO: MAD
          MES: "2026-08"
          NOCHES: "4"
          UMBRAL: "1000"
          MONEDA: usd
          SOLO_DIRECTOS: "false"
          AVISAR_MINIMO: "true"
          SERP_MAX_VERIF: "5"
        run: python buscar_vuelos.py

      - name: Guardar estado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add estado.json
          git diff --staged --quiet || git commit -m "Actualizar estado [skip ci]"
          git push
